spring:
  application:
    name: shopping-store

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native}

  datasource:
    initialization-mode: always
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/shopping_store_db
    username: ${DB_USER:shopping_store}
    password: ${DB_PASSWORD:shopping_store}

  jpa:
    open-in-view: false

  data:
    web:
      pageable:
        default-page-size: 20
        page-parameter: page
        size-parameter: size
        sort-parameter: sort

  cloud:
    config:
      server:
        native:
          searchLocations:
            - classpath:config/commerce/{application}

eureka:
  client:
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/

server:
  port: 0