kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP:aggregator-group}
    auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
    enable-auto-commit: false
    max-poll-records: 100
    poll-timeout-ms: 200

  producer:
    retries: ${KAFKA_PRODUCER_RETRIES:3}
    delivery-timeout-ms: ${KAFKA_DELIVERY_TIMEOUT_MS:10000}
    request-timeout-ms: ${KAFKA_REQUEST_TIMEOUT_MS:10000}

  topics:
    sensors-events: ${KAFKA_TOPIC_SENSORS:telemetry.sensors.v1}
    snapshots-events: ${KAFKA_TOPIC_SNAPSHOTS:telemetry.snapshots.v1}