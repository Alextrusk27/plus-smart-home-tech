spring:
  application:
    name: shopping-cart

  config:
    import: "configserver:"

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 500
        max-interval: 5000
        multiplier: 1.5
      discovery:
        enabled: true
        serviceId: config-server

eureka:
  client:
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

server:
  port: 0